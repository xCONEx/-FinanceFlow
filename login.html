<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login • FinanceFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdn.tailwindcss.com">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-lg shadow-md text-center max-w-md w-full">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Entrar no FinanceFlow</h1>
    <button id="login-google" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded w-full flex items-center justify-center space-x-2">
      <i class="fab fa-google"></i>
      <span>Entrar com Google</span>
    </button>
    <p class="mt-4 text-sm text-gray-500">Seus dados serão sincronizados automaticamente com a nuvem após login.</p>
  </div>

  <!-- Overlay de carregamento -->
  <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
    <div class="text-white text-lg">Carregando...</div>
  </div>

  <!-- FontAwesome -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <!-- Firebase login + sync -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAIO4Qo-kuobCIpRh-XTye5Fs_-9uZmzlY",
      authDomain: "financeflow-e0fae.firebaseapp.com",
      projectId: "financeflow-e0fae",
      storageBucket: "financeflow-e0fae.firebasestorage.app",
      messagingSenderId: "970984329138",
      appId: "1:970984329138:web:429a185b8bab1971991eab"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("login-google");
    const loading = document.getElementById("loading-overlay");

    loginBtn?.addEventListener("click", async () => {
      try {
        loading.classList.remove("hidden");
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        if (user) {
          const ref = doc(db, "usuarios", user.uid);
          const docSnap = await getDoc(ref);

          if (docSnap.exists()) {
            localStorage.setItem("financeFlowData", JSON.stringify(docSnap.data()));
          } else {
            const emptyData = { jobs: [], expenses: [], equipments: [], routine: {} };
            await setDoc(ref, emptyData);
            localStorage.setItem("financeFlowData", JSON.stringify(emptyData));
          }

          window.location.href = "index.html";
        }
      } catch (err) {
        console.error("Erro ao fazer login:", err);
        alert("Erro ao entrar com o Google.");
      } finally {
        loading.classList.add("hidden");
      }
    });
  </script>

</body>
</html>
